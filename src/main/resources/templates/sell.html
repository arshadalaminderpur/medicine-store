<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Medicine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/medicines}">Medicine Shop</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/medicines}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/add}">Add Medicine</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/manage}">Manage</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Sell Medicine</h4>
                </div>
                <div class="card-body">
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="mb-3">
                        <div class="fw-semibold" th:text="${medicine.name}"></div>
                        <div class="text-muted">Available stock: <span th:text="${medicine.quantity}"></span></div>
                        <div class="text-muted">Unit price: <span id="unitPrice" th:text="${#numbers.formatDecimal(medicine.price, 1, 2)}"></span></div>
                    </div>

                    <form th:action="@{/sell/{id}(id=${medicine.id})}" th:object="${sellRequest}" method="post" class="row g-3" novalidate>
                        <div class="col-md-6">
                            <label for="quantityToSell" class="form-label">Quantity to Sell</label>
                            <input id="quantityToSell"
                                   type="number"
                                   min="1"
                                   th:attr="max=${medicine.quantity}"
                                   th:field="*{quantityToSell}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('quantityToSell')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('quantityToSell')}"
                                 th:errors="*{quantityToSell}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Total Price</label>
                            <div class="form-control bg-light fw-semibold" id="totalPrice">0.00</div>
                        </div>
                        <div class="col-12 d-flex justify-content-between">
                            <a class="btn btn-outline-secondary" th:href="@{/manage}">Cancel</a>
                            <button type="submit" class="btn btn-warning">Confirm Sell</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    const quantityInput = document.getElementById('quantityToSell');
    const totalPriceNode = document.getElementById('totalPrice');
    const unitPrice = Number(document.getElementById('unitPrice').textContent);

    function updateTotalPrice() {
        const quantity = Number(quantityInput.value || 0);
        const total = quantity > 0 ? quantity * unitPrice : 0;
        totalPriceNode.textContent = total.toFixed(2);
    }

    quantityInput.addEventListener('input', updateTotalPrice);
    updateTotalPrice();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
